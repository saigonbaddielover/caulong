<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[MOCK] Lịch Rảnh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            font-family: 'DM Sans', sans-serif;
        }

        body {
            background: #f0f2f5;
            color: #1a1a2e;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            border: 1px solid #e8eaed;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: spin 1s linear infinite;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.25s ease forwards;
        }

        .mock-badge {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: #1e1e2e;
            color: #a6e3a1;
            font-size: 10px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 99px;
            letter-spacing: 0.1em;
            z-index: 9999;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <div class="mock-badge">MOCK MODE</div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // ── MOCK CONFIG ───────────────────────────────────────────
        const MOCK_ME = {
            uid: 'user-me',
            displayName: 'Manh Nguyen',
            photoURL: null,
        };

        // Tạo mock schedules để cover đủ các case heatmap 1-8+
        // Mỗi entry = 1 user với danh sách slots họ đã tick
        // Mỗi slot T{n}-08:00 có đúng n người → cover case 1..11
        // T2=1, T3=2, T4=3, T5=4, T6=5, T7=6, CN=7
        // T2-09:00=8, T2-09:30=9, T2-10:00=10, T2-10:30=11
        const MOCK_SCHEDULES = [
            {
                id: 'user-me', name: 'Manh Nguyen', photo: null,
                slots: ['T2-08:00', 'T3-08:00', 'T4-08:00', 'T5-08:00', 'T6-08:00', 'T7-08:00', 'CN-08:00', 'T2-09:00', 'T2-09:30', 'T2-10:00', 'T2-10:30']
            },
            {
                id: 'u2', name: 'An Tran', photo: null,
                slots: ['T3-08:00', 'T4-08:00', 'T5-08:00', 'T6-08:00', 'T7-08:00', 'CN-08:00', 'T2-09:00', 'T2-09:30', 'T2-10:00', 'T2-10:30']
            },
            {
                id: 'u3', name: 'Binh Le', photo: null,
                slots: ['T4-08:00', 'T5-08:00', 'T6-08:00', 'T7-08:00', 'CN-08:00', 'T2-09:00', 'T2-09:30', 'T2-10:00', 'T2-10:30']
            },
            {
                id: 'u4', name: 'Chi Pham', photo: null,
                slots: ['T5-08:00', 'T6-08:00', 'T7-08:00', 'CN-08:00', 'T2-09:00', 'T2-09:30', 'T2-10:00', 'T2-10:30']
            },
            {
                id: 'u5', name: 'Dung Nguyen Minh', photo: null,
                slots: ['T6-08:00', 'T7-08:00', 'CN-08:00', 'T2-09:00', 'T2-09:30', 'T2-10:00', 'T2-10:30']
            },
            {
                id: 'u6', name: 'Em', photo: null,
                slots: ['T7-08:00', 'CN-08:00', 'T2-09:00', 'T2-09:30', 'T2-10:00', 'T2-10:30']
            },
            {
                id: 'u7', name: 'Gia Huy', photo: null,
                slots: ['CN-08:00', 'T2-09:00', 'T2-09:30', 'T2-10:00', 'T2-10:30']
            },
            {
                id: 'u8', name: 'Huong Dao', photo: null,
                slots: ['T2-09:00', 'T2-09:30', 'T2-10:00', 'T2-10:30']
            },
            {
                id: 'u9', name: 'Ivan Nguyen', photo: null,
                slots: ['T2-09:30', 'T2-10:00', 'T2-10:30']
            },
            {
                id: 'u10', name: 'Jenny Tran Thi Bich Nga', photo: null,  // tên cực dài
                slots: ['T2-10:00', 'T2-10:30']
            },
            {
                id: 'u11', name: 'K', photo: null,  // tên cực ngắn
                slots: ['T2-10:30']
            },
        ];
        // Kết quả:
        // T2-08:00 = 1 người  → mức 1
        // T3-08:00 = 2 người  → mức 2
        // T4-08:00 = 3 người  → mức 3
        // T5-08:00 = 4 người  → mức 4
        // T6-08:00 = 5 người  → mức 5
        // T7-08:00 = 6 người  → mức 6
        // CN-08:00 = 7 người  → mức 7
        // T2-09:00 = 8 người  → mức 8 (cap)
        // T2-09:30 = 9 người  → mức 8 (cap)
        // T2-10:00 = 10 người → mức 8 (cap)
        // T2-10:30 = 11 người → mức 8 (cap)
        // ─────────────────────────────────────────────────────────

        const DAYS = ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];
        const TIMES = [];
        for (let h = 7; h <= 22; h++) {
            for (const m of ['00', '30']) {
                const val = h * 100 + parseInt(m);
                if (val >= 1130 && val < 1330) continue;
                if (val > 2200) continue;
                TIMES.push(`${String(h).padStart(2, '0')}:${m}`);
            }
        }

        const HEAT_STEPS = [
            { bg: '#f0fdf4', text: '#166534', border: '#bbf7d0' }, // 1 — xanh mint nhạt
            { bg: '#dcfce7', text: '#15803d', border: '#86efac' }, // 2 — xanh lá nhạt
            { bg: '#ecfccb', text: '#3f6212', border: '#bef264' }, // 3 — lime
            { bg: '#fefce8', text: '#854d0e', border: '#fde047' }, // 4 — vàng nhạt
            { bg: '#fef08a', text: '#92400e', border: '#facc15' }, // 5 — vàng
            { bg: '#ffedd5', text: '#9a3412', border: '#fdba74' }, // 6 — cam nhạt
            { bg: '#fb923c', text: '#fff', border: '#ea580c' }, // 7 — cam
            { bg: '#ea580c', text: '#fff', border: '#c2410c' }, // 8 — cam đậm
        ];

        function heatColor(count) {
            if (!count) return { bg: '#f8f9fa', text: '#d1d5db', border: '#f0f0f0' };
            return HEAT_STEPS[Math.min(count, 8) - 1];
        }

        const SyncIcon = ({ spin }) => (
            <svg className={`w-3 h-3 ${spin ? 'spin' : ''}`} fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />
            </svg>
        );

        function App() {
            const [mySlots, setMySlots] = useState(new Set(MOCK_SCHEDULES[0].slots));
            const [fixed, setFixed] = useState(false);
            const [activeSlot, setActiveSlot] = useState('T2-10:30'); // 11 người

            const toggleSlot = (day, time) => {
                const key = `${day}-${time}`;
                setMySlots(prev => {
                    const next = new Set(prev);
                    next.has(key) ? next.delete(key) : next.add(key);
                    return next;
                });
            };

            const toggleFixed = () => setFixed(!fixed);

            // Mock schedules but with mySlots updated
            const allSchedules = useMemo(() => [
                { ...MOCK_SCHEDULES[0], slots: Array.from(mySlots) },
                ...MOCK_SCHEDULES.slice(1)
            ], [mySlots]);

            const heatmap = useMemo(() => {
                const map = {};
                allSchedules.forEach(entry => {
                    entry.slots.forEach(slot => { map[slot] = (map[slot] || 0) + 1; });
                });
                return map;
            }, [allSchedules]);

            const slotUsers = useMemo(() => {
                const map = {};
                allSchedules.forEach(entry => {
                    entry.slots.forEach(slot => {
                        if (!map[slot]) map[slot] = [];
                        map[slot].push({ name: entry.name, photo: entry.photo });
                    });
                });
                return map;
            }, [allSchedules]);

            return (
                <div className="min-h-screen p-4 md:p-6">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-5 max-w-[1400px] mx-auto">
                        <div className="flex items-center gap-2.5">
                            <div className="w-8 h-8 rounded-xl flex items-center justify-center text-base"
                                style={{ background: 'linear-gradient(135deg, #667eea, #764ba2)' }}>📅</div>
                            <span className="font-bold text-base tracking-tight">Lịch Rảnh</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="flex items-center gap-1.5 text-[10px] font-semibold tracking-wider uppercase text-gray-300">
                                <SyncIcon spin={false} />
                                MOCK MODE
                            </div>
                            <div className="flex items-center gap-2 px-3 py-1.5 rounded-xl bg-white border border-gray-100">
                                <div className="w-6 h-6 rounded-full bg-indigo-100 text-indigo-500 flex items-center justify-center text-[10px] font-bold">M</div>
                                <span className="text-xs font-medium text-gray-600">{MOCK_ME.displayName}</span>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 max-w-[1400px] mx-auto">

                        {/* CÁ NHÂN */}
                        <section className="lg:col-span-5 card p-5 flex flex-col">
                            <div className="flex items-center justify-between mb-5">
                                <h2 className="text-[11px] font-bold uppercase tracking-[0.15em] text-indigo-500 flex items-center gap-1.5">
                                    <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>
                                    1. Lịch của tôi
                                </h2>
                                <div className="flex items-center gap-3">
                                    <div className="relative group">
                                        <button onClick={toggleFixed}
                                            className={`flex items-center gap-1.5 px-2.5 py-1 rounded-lg border text-[10px] font-semibold transition-all duration-200
                      ${fixed
                                                    ? 'bg-violet-50 border-violet-200 text-violet-600'
                                                    : 'bg-gray-50 border-gray-100 text-gray-300 hover:border-gray-200'}`}>
                                            <span className={`w-6 h-3 rounded-full relative transition-colors duration-200 ${fixed ? 'bg-violet-400' : 'bg-gray-200'}`}>
                                                <span className={`absolute top-0.5 w-2 h-2 rounded-full bg-white shadow transition-all duration-200 ${fixed ? 'left-3.5' : 'left-0.5'}`} />
                                            </span>
                                            Cố định
                                        </button>
                                        <div className="absolute right-0 top-full mt-1.5 w-56 bg-gray-900 text-white text-[10px] leading-relaxed rounded-xl p-3 opacity-0 group-hover:opacity-100 transition-opacity duration-150 pointer-events-none z-50 shadow-xl">
                                            Khi bật, lịch của bạn sẽ cố định hàng tuần và không bị tự động xoá sau mỗi ngày.
                                        </div>
                                    </div>
                                    <span className="text-[10px] text-gray-300 font-medium">{mySlots.size} slot đã chọn</span>
                                </div>
                            </div>
                            <TimeGrid days={DAYS} times={TIMES} renderCell={(day, time) => {
                                const key = `${day}-${time}`;
                                const sel = mySlots.has(key);
                                return (
                                    <button key={key} onClick={() => toggleSlot(day, time)}
                                        className={`rounded-xl border h-9 flex items-center justify-center transition-all duration-150
                      ${sel
                                                ? 'bg-indigo-500 border-indigo-600 text-white shadow-sm scale-[0.97]'
                                                : 'bg-gray-50 border-gray-100 hover:bg-white hover:border-indigo-200 hover:shadow-sm'}`}>
                                        {sel && <svg className="w-3 h-3" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>}
                                    </button>
                                );
                            }} />
                        </section>

                        {/* TỔNG HỢP */}
                        <section className="lg:col-span-5 card p-5 flex flex-col">
                            <div className="flex items-center justify-between mb-5">
                                <h2 className="text-[11px] font-bold uppercase tracking-[0.15em] text-rose-400 flex items-center gap-1.5">
                                    <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-3-3.87M9 21v-2a4 4 0 01-4-4H5a4 4 0 01-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" /></svg>
                                    2. Tổng hợp
                                </h2>
                                <span className="text-[10px] text-gray-300 font-medium">{MOCK_SCHEDULES.length} thành viên</span>
                            </div>
                            <TimeGrid days={DAYS} times={TIMES} renderCell={(day, time) => {
                                const key = `${day}-${time}`;
                                const count = heatmap[key] || 0;
                                const c = heatColor(count);
                                const isActive = activeSlot === key;
                                return (
                                    <button key={key}
                                        onClick={() => setActiveSlot(isActive ? null : key)}
                                        style={{ background: c.bg, color: c.text, borderColor: isActive ? '#6366f1' : c.border, outline: isActive ? '2px solid #c7d2fe' : 'none', outlineOffset: '1px' }}
                                        className="rounded-xl border h-9 flex items-center justify-center text-[11px] font-bold transition-all duration-150 hover:brightness-95">
                                        {count > 0 ? count : ''}
                                    </button>
                                );
                            }} />
                        </section>

                        {/* SIDEBAR */}
                        <aside className="lg:col-span-2">
                            <div className="card p-5 sticky top-4">
                                <h2 className="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-300 mb-4 pb-3 border-b border-gray-50">
                                    Thành viên rảnh
                                </h2>
                                {!activeSlot ? (
                                    <div className="flex flex-col items-center justify-center py-14 text-gray-200 text-center">
                                        <svg className="w-6 h-6 mb-2" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" /></svg>
                                        <p className="text-[9px] font-semibold uppercase tracking-widest">Chọn ô tổng hợp</p>
                                    </div>
                                ) : (
                                    <div className="fade-in space-y-3">
                                        <div className="bg-gray-50 rounded-xl p-3 text-center border border-gray-100">
                                            <p className="text-[10px] font-bold text-gray-500 tracking-tight">
                                                {activeSlot.replace('-', ' • ')}
                                            </p>
                                        </div>
                                        <div className="space-y-1.5 max-h-[60vh] overflow-y-auto">
                                            {(slotUsers[activeSlot] || []).length === 0 ? (
                                                <p className="text-[10px] text-center py-8 text-gray-300 italic">Trống</p>
                                            ) : (slotUsers[activeSlot] || []).map((u, i) => (
                                                <div key={i} className="flex items-center gap-2 p-2 rounded-xl bg-white border border-gray-100 hover:border-indigo-100 transition-all">
                                                    {u.photo
                                                        ? <img src={u.photo} className="w-7 h-7 rounded-lg object-cover" referrerPolicy="no-referrer" />
                                                        : <div className="w-7 h-7 rounded-lg bg-indigo-50 text-indigo-400 flex items-center justify-center text-[10px] font-bold">{u.name.charAt(0).toUpperCase()}</div>
                                                    }
                                                    <p className="text-[11px] font-semibold text-gray-500 truncate">{u.name}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </aside>
                    </div>
                </div>
            );
        }

        function TimeGrid({ days, times, renderCell }) {
            return (
                <div className="overflow-x-auto flex-1">
                    <div style={{ minWidth: '440px' }}>
                        <div className="grid gap-1.5 mb-3 pb-2 border-b border-gray-50"
                            style={{ gridTemplateColumns: '40px repeat(7, 1fr)' }}>
                            <div />
                            {days.map(d => (
                                <div key={d} className="text-center text-[10px] font-bold text-gray-400 uppercase tracking-tight">{d}</div>
                            ))}
                        </div>
                        <div className="max-h-[72vh] overflow-y-auto pr-1 space-y-1">
                            {times.map(time => {
                                const isHour = time.endsWith(':00');
                                return (
                                    <div key={time} className="grid gap-1.5" style={{ gridTemplateColumns: '40px repeat(7, 1fr)' }}>
                                        <div className={`flex items-center justify-end pr-2 text-right select-none
                      ${isHour ? 'text-[10px] font-bold text-gray-500' : 'text-[9px] font-medium text-gray-300'}`}>
                                            {isHour ? time : time.split(':')[1]}
                                        </div>
                                        {days.map(day => renderCell(day, time))}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
