<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[MOCK] Lịch Rảnh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            font-family: 'DM Sans', sans-serif;
        }

        body {
            background: #f0f2f5;
            color: #1a1a2e;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            border: 1px solid #e8eaed;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: spin 1s linear infinite;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.25s ease forwards;
        }

        .mock-badge {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: #1e1e2e;
            color: #a6e3a1;
            font-size: 10px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 99px;
            letter-spacing: 0.1em;
            z-index: 9999;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <div class="mock-badge">MOCK MODE</div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // ── 1. CONSTANTS ──────────────────────────────────────────
        const DAYS = ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];
        const HEAT_STEPS = [
            { bg: '#f0fdf4', text: '#166534', border: '#bbf7d0' },
            { bg: '#dcfce7', text: '#15803d', border: '#86efac' },
            { bg: '#ecfccb', text: '#3f6212', border: '#bef264' },
            { bg: '#fefce8', text: '#854d0e', border: '#fde047' },
            { bg: '#fef08a', text: '#92400e', border: '#facc15' },
            { bg: '#ffedd5', text: '#9a3412', border: '#fdba74' },
            { bg: '#fb923c', text: '#fff', border: '#ea580c' },
            { bg: '#ea580c', text: '#fff', border: '#c2410c' },
        ];

        const COURTS = [
            { name: 'EZB Đằng Hải', phone: '0779766333', address: '84 Lũng Bắc' },
            { name: 'EZB Cầu Niệm', phone: '0934275222', address: '22 Tân Hà' },
            { name: 'EZB An Đồng', phone: '0369633444', address: '87 đường 302' },
            { name: 'EZB Văn Cao', phone: '0914616818', address: '14/333B Văn Cao' },
            { name: 'Phú Cường', phone: '0333766333', address: '135 Quán Trữ' },
            { name: 'Hải Tiến', phone: '0906903555', address: 'lô 9 Lê Hồng Phong' },
            { name: 'Giang Lakaika', phone: '0945433979', address: '50 An Trực' },
            { name: 'TD', phone: '0971186416', address: '34/3B Lê Hồng Phong' },
            { name: 'Phoenix 1', phone: '0976171250', address: 'Số 28, ngõ 739, Nguyễn Văn Linh' },
            { name: 'Phoenix 2', phone: '0976171250', address: 'Ngõ Nguyễn Sơn Hà, 727 Nguyễn Văn Linh' },
        ];

        const TIMES = (() => {
            const t = [];
            for (let h = 8; h <= 21; h++) {
                for (const m of ['00', '30']) {
                    const val = h * 100 + parseInt(m);
                    if (val >= 1200 && val <= 1330) continue;
                    t.push(`${String(h).padStart(2, '0')}:${m}`);
                }
            }
            return t;
        })();

        const MOCK_ME = { uid: 'user-me', displayName: 'Mạnh Nguyễn', photoURL: null };
        const MOCK_SCHEDULES = [
            { id: 'user-me', name: 'Mạnh Nguyễn', photo: null, slots: ['T2-08:00', 'T3-08:00', 'T4-08:00', 'T5-08:00', 'T6-08:00', 'T7-08:00', 'CN-08:00'] },
            { id: 'u2', name: 'An Tran', photo: null, slots: ['T3-08:00', 'T4-08:00', 'T5-08:00', 'T6-08:00', 'T7-08:00', 'CN-08:00'] },
            { id: 'u3', name: 'Binh Le', photo: null, slots: ['T4-08:00', 'T5-08:00', 'T6-08:00', 'T7-08:00', 'CN-08:00'] },
            { id: 'u4', name: 'Chi Pham', photo: null, slots: ['T5-08:00', 'T6-08:00', 'T7-08:00', 'CN-08:00'] },
            { id: 'u5', name: 'Dung Nguyen', photo: null, slots: ['T6-08:00', 'T7-08:00', 'CN-08:00'] },
            { id: 'u6', name: 'Em', photo: null, slots: ['T7-08:00', 'CN-08:00'] },
            { id: 'u7', name: 'Gia Huy', photo: null, slots: ['CN-08:00', 'T2-09:00'] },
            { id: 'u8', name: 'Huong Dao', photo: null, slots: ['T2-09:00', 'T2-09:30'] },
            { id: 'u9', name: 'Ivan Nguyen', photo: null, slots: ['T2-09:30', 'T2-10:00'] },
            { id: 'u10', name: 'Jenny Tran', photo: null, slots: ['T2-10:00', 'T2-10:30'] },
            { id: 'u11', name: 'Kiên', photo: null, slots: ['T2-10:30'] },
        ];

        // ── 2. UTILS ──────────────────────────────────────────────
        const heatColor = (count) => {
            if (!count) return { bg: '#f8f9fa', text: '#d1d5db', border: '#f0f0f0' };
            return HEAT_STEPS[Math.min(count, 8) - 1];
        };

        const getTodayStr = () => {
            const d = new Date();
            const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
            const gmt7 = new Date(utc + (3600000 * 7));
            return ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'][gmt7.getDay()];
        };

        // ── 3. UI COMPONENTS (PRIMITIVES) ──────────────────────────
        const SyncIcon = ({ spin }) => (
            <svg className={`w-3 h-3 ${spin ? 'spin' : ''}`} fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />
            </svg>
        );

        const SectionHeader = ({ title, icon, colorClass, children }) => (
            <div className="flex flex-wrap items-center justify-between gap-3 mb-5 shrink-0">
                <h2 className={`text-[11px] font-bold uppercase tracking-[0.15em] ${colorClass} flex items-center gap-1.5 whitespace-nowrap`}>
                    {icon} {title}
                </h2>
                {children}
            </div>
        );

        const FixedToggle = ({ fixed, onToggle }) => (
            <div className="relative group">
                <button onClick={onToggle} className={`flex items-center gap-1.5 px-2.5 py-1 rounded-lg border text-[10px] font-semibold transition-all duration-200 text-[#04BADE] ${fixed ? 'bg-[#04BADE]/10 border-[#04BADE]/30' : 'bg-gray-50 border-gray-200 hover:bg-gray-100'}`}>
                    Cố định
                    <span className={`w-6 h-3 rounded-full relative transition-colors duration-200 ${fixed ? 'bg-[#04BADE]' : 'bg-gray-300'}`}>
                        <span className={`absolute top-0.5 w-2 h-2 rounded-full bg-white transition-all ${fixed ? 'left-3.5' : 'left-0.5'}`} />
                    </span>
                </button>
                <div className="absolute right-0 top-full mt-1.5 w-56 bg-gray-900 text-white text-[10px] leading-relaxed rounded-xl p-3 opacity-0 group-hover:opacity-100 transition-opacity duration-150 pointer-events-none z-50 shadow-xl">
                    Khi bật, lịch của bạn sẽ cố định hàng tuần và không bị tự động xoá sau mỗi ngày.
                </div>
            </div>
        );

        // ── 4. SHARED LAYOUT COMPONENTS ──────────────────────────
        const TimeGrid = ({ days, times, renderCell, innerRef }) => {
            const todayStr = useMemo(getTodayStr, []);
            const todayIndex = days.indexOf(todayStr);

            return (
                <div className="overflow-x-auto flex-1 flex flex-col min-h-0">
                    <div ref={innerRef} className="flex-1 overflow-y-auto relative custom-scrollbar">
                        <div className="sticky top-0 z-40 bg-white pt-3 pb-2 px-2 border-b border-gray-100">
                            {todayIndex !== -1 && (
                                <div className="absolute inset-0 pointer-events-none z-10 px-2" style={{ top: '1px', bottom: '-1px' }}>
                                    <div className="grid h-full gap-1.5" style={{ gridTemplateColumns: '40px repeat(7, 1fr)' }}>
                                        <div />
                                        {days.map((d, i) => (
                                            <div key={d} className="relative h-full">
                                                {i === todayIndex && (
                                                    <div className="absolute top-0 bottom-0 border-[#04BADE] rounded-t-[10px]" style={{ left: '-3.75px', right: '-3.75px', borderTopWidth: '1.5px', borderLeftWidth: '1.5px', borderRightWidth: '1.5px', borderBottomWidth: '0' }}></div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            <div className="grid gap-1.5 relative z-20 text-[10px] font-bold uppercase tracking-tight text-gray-400 py-1" style={{ gridTemplateColumns: '40px repeat(7, 1fr)' }}>
                                <div />
                                {days.map((d, i) => <div key={d} className={`text-center ${i === todayIndex ? 'text-[#04BADE]' : ''}`}>{d}</div>)}
                            </div>
                        </div>
                        <div className="relative pt-2 pb-4 px-2">
                            <div className="relative">
                                {todayIndex !== -1 && (
                                    <div className="absolute inset-0 pointer-events-none z-20" style={{ top: '-16px', bottom: '-4px' }}>
                                        <div className="grid h-full gap-1.5" style={{ gridTemplateColumns: '40px repeat(7, 1fr)' }}>
                                            <div />
                                            {days.map((d, i) => (
                                                <div key={d} className="relative h-full">
                                                    {i === todayIndex && (
                                                        <div className="absolute top-0 bottom-0 border-[#04BADE] rounded-b-[10px]" style={{ left: '-3.75px', right: '-3.75px', borderTopWidth: '0', borderLeftWidth: '1.5px', borderRightWidth: '1.5px', borderBottomWidth: '1.5px' }}></div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                <div className="space-y-1.5 relative z-10">
                                    {times.map((time) => {
                                        const isHour = time.endsWith(':00');
                                        return (
                                            <React.Fragment key={time}>
                                                {(time === '14:00' || time === '18:00') && (
                                                    <div className="flex items-center py-2 my-1 relative"><div className="w-[40px]"></div><div className="flex-1 border-t border-dashed border-indigo-200"></div></div>
                                                )}
                                                <div className="grid gap-1.5 relative" style={{ gridTemplateColumns: '40px repeat(7, 1fr)' }}>
                                                    <div className={`flex items-center justify-end pr-2 text-right select-none ${isHour ? 'text-[10px] font-bold text-gray-500' : 'text-[9px] font-medium text-gray-400'}`}>{time}</div>
                                                    {days.map(day => <div key={day} className="relative">{renderCell(day, time)}</div>)}
                                                </div>
                                            </React.Fragment>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ── 5. MODAL COMPONENTS ──────────────────────────────────
        const ManageBookingModal = ({ heatmap, bookedSlots, newSelection, setNewSelection, deleteSelection, setDeleteSelection, onClose, onSelectCourt }) => (
            <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[100] px-4 fade-in">
                <div className="bg-white p-5 rounded-3xl max-w-3xl w-full shadow-2xl flex flex-col h-[85vh]">
                    <div className="flex items-center justify-between mb-4 shrink-0">
                        <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2"><span>🏸</span> Quản lý đặt sân</h3>
                        <div className="flex gap-2">
                            <div className="flex items-center gap-1"><span className="w-2.5 h-2.5 bg-[#04BADE] rounded-sm"></span><span className="text-[8px] font-bold uppercase text-gray-400">Đã chốt</span></div>
                            <div className="flex items-center gap-1"><span className="w-2.5 h-2.5 bg-amber-400 rounded-sm"></span><span className="text-[8px] font-bold uppercase text-gray-400">Chọn mới</span></div>
                            <div className="flex items-center gap-1"><span className="w-2.5 h-2.5 bg-rose-400 rounded-sm"></span><span className="text-[8px] font-bold uppercase text-gray-400">Sẽ xóa</span></div>
                        </div>
                    </div>
                    <div className="flex-1 min-h-0 bg-gray-50 rounded-2xl border border-gray-100 p-2 flex flex-col">
                        <TimeGrid days={DAYS} times={TIMES} renderCell={(day, time) => {
                            const key = `${day}-${time}`;
                            const count = heatmap[key] || 0;
                            const isBooked = !!bookedSlots[key];
                            const isNew = newSelection.has(key);
                            const isDel = deleteSelection.has(key);

                            let bg = '#fff', border = '#f3f4f6', text = '#d1d5db';
                            if (isBooked && !isDel) { bg = '#04BADE'; border = '#03a6c7'; text = '#fff'; }
                            else if (isDel) { bg = '#fb7185'; border = '#e11d48'; text = '#fff'; }
                            else if (isNew) { bg = '#fbbf24'; border = '#f59e0b'; text = '#fff'; }
                            else if (count > 0) { const c = heatColor(count); bg = c.bg; border = c.border; text = c.text; }

                            return (
                                <button key={key} onClick={() => {
                                    if (isBooked) {
                                        const next = new Set(deleteSelection);
                                        next.has(key) ? next.delete(key) : next.add(key);
                                        setDeleteSelection(next);
                                    } else {
                                        const next = new Set(newSelection);
                                        next.has(key) ? next.delete(key) : next.add(key);
                                        setNewSelection(next);
                                    }
                                }} style={{ background: bg, color: text, borderColor: border }} className="w-full rounded-xl border h-9 flex items-center justify-center text-[11px] font-bold relative transition-all shadow-sm hover:brightness-95">
                                    {count > 0 ? count : ''}
                                    {(isBooked || isNew) && !isDel && <span className="absolute bottom-0.5 right-0.5 text-[10px]">🏸</span>}
                                    {isDel && <span className="absolute inset-0 flex items-center justify-center text-white bg-rose-500/20 rounded-xl">✕</span>}
                                </button>
                            );
                        }} />
                    </div>
                    <div className="flex gap-3 justify-end mt-4 shrink-0">
                        <button onClick={onClose} className="px-5 py-2.5 rounded-xl text-xs font-bold text-gray-500 bg-gray-100 hover:bg-gray-200 transition">Hủy</button>
                        <button onClick={onSelectCourt} disabled={newSelection.size === 0 && deleteSelection.size === 0} className="px-5 py-2.5 rounded-xl text-xs font-bold text-white bg-[#04BADE] hover:bg-[#03a6c7] transition shadow-lg disabled:opacity-50">Tiếp tục</button>
                    </div>
                </div>
            </div>
        );

        const SelectCourtModal = ({ newCount, delCount, selectedCourt, setSelectedCourt, onBack, onSave }) => (
            <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm flex items-center justify-center z-[110] px-4 fade-in">
                <div className="bg-white p-6 rounded-3xl max-w-sm w-full shadow-2xl">
                    <div className="text-center mb-6">
                        <div className="w-14 h-14 bg-indigo-50 text-indigo-500 rounded-2xl flex items-center justify-center mx-auto mb-3">
                            <svg className="w-8 h-8" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                        </div>
                        <h3 className="text-lg font-bold text-gray-800">Xác nhận thay đổi</h3>
                    </div>
                    <div className="space-y-3 mb-6">
                        {newCount > 0 && (
                            <div className="p-3 bg-amber-50 rounded-xl border border-amber-100">
                                <p className="text-[10px] font-bold text-amber-600 uppercase tracking-wider">Thêm mới/Cập nhật {newCount} ca:</p>
                                <select value={selectedCourt} onChange={(e) => setSelectedCourt(e.target.value)} className="w-full mt-2 p-2 bg-white border border-amber-200 rounded-lg text-xs font-bold outline-none focus:border-amber-400 transition-all">
                                    {COURTS.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
                                </select>
                            </div>
                        )}
                        {delCount > 0 && (
                            <div className="p-3 bg-rose-50 rounded-xl border border-rose-100">
                                <p className="text-[10px] font-bold text-rose-600 uppercase tracking-wider">Sẽ gỡ đặt sân cho {delCount} ca</p>
                            </div>
                        )}
                    </div>
                    <div className="flex gap-3 pt-2">
                        <button onClick={onBack} className="flex-1 px-4 py-2.5 rounded-xl text-xs font-bold text-gray-500 bg-gray-50 hover:bg-gray-100 transition">Quay lại</button>
                        <button onClick={onSave} className="flex-1 px-4 py-2.5 rounded-xl text-xs font-bold text-white bg-[#04BADE] hover:bg-[#03a6c7] transition shadow-lg shadow-cyan-500/20">Lưu thay đổi</button>
                    </div>
                </div>
            </div>
        );

        const CourtListModal = ({ onClose }) => (
            <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[100] px-4 fade-in">
                <div className="bg-white p-6 rounded-3xl max-w-4xl w-full shadow-2xl flex flex-col max-h-[85vh]">
                    <div className="flex items-center justify-between mb-6 shrink-0">
                        <h3 className="text-xl font-bold text-gray-800 flex items-center gap-2">📍 Danh sách sân</h3>
                        <button onClick={onClose} className="text-gray-400 hover:text-gray-600 transition"><svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" /></svg></button>
                    </div>
                    <div className="flex-1 overflow-auto custom-scrollbar border border-gray-100 rounded-2xl bg-gray-50/50">
                        <table className="w-full text-left border-collapse text-xs">
                            <thead className="bg-white sticky top-0 z-10 shadow-sm text-[10px] font-bold text-gray-400 uppercase">
                                <tr><th className="p-4 w-12 text-center border-b">#</th><th className="p-4 border-b">Tên sân</th><th className="p-4 border-b">SĐT</th><th className="p-4 border-b">Địa chỉ</th></tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {COURTS.map((court, idx) => (
                                    <tr key={idx} className="hover:bg-white transition-colors group">
                                        <td className="p-4 font-bold text-gray-300 text-center">{idx + 1}</td>
                                        <td className="p-4 font-bold text-[#04BADE]">{court.name}</td>
                                        <td className="p-4 font-semibold text-gray-600 group-hover:text-emerald-500 transition-colors"><a href={`tel:${court.phone}`}>{court.phone}</a></td>
                                        <td className="p-4 text-gray-500">{court.address}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <div className="mt-6 text-center"><button onClick={onClose} className="px-8 py-3 rounded-2xl text-xs font-bold text-white bg-[#04BADE] hover:bg-[#03a6c7] transition shadow-lg">Đóng</button></div>
                </div>
            </div>
        );

        const ConfirmationModal = ({ config, onClose }) => (
            <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm flex items-center justify-center z-[100] px-4 fade-in">
                <div className="bg-white p-6 rounded-2xl max-w-xs w-full shadow-2xl text-center">
                    <h3 className="text-lg font-bold mb-2 text-gray-800">Xác nhận</h3>
                    <p className="text-sm text-gray-500 mb-6">{config.message}</p>
                    <div className="flex gap-3 justify-center">
                        <button onClick={onClose} className="flex-1 px-4 py-2.5 rounded-xl text-xs font-bold text-gray-500 bg-gray-50 hover:bg-gray-100 transition">Tao chưa</button>
                        <button onClick={config.onConfirm} className="flex-1 px-4 py-2.5 rounded-xl text-xs font-bold text-white bg-[#04BADE] hover:bg-[#03a6c7] transition">Tao chắc</button>
                    </div>
                </div>
            </div>
        );

        const MemberListModal = ({ members, onClose }) => (
            <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[100] px-4 fade-in">
                <div className="bg-white p-6 rounded-3xl max-w-md w-full shadow-2xl flex flex-col max-h-[80vh]">
                    <div className="flex items-center justify-between mb-6 shrink-0">
                        <h3 className="text-xl font-bold text-gray-800 flex items-center gap-2">👑 Danh sách thượng đế</h3>
                        <button onClick={onClose} className="text-gray-400 hover:text-gray-600 transition"><svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" /></svg></button>
                    </div>
                    <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-2">
                        {members.map((m, idx) => (
                            <div key={idx} className="flex items-center gap-3 p-3 rounded-2xl bg-gray-50 border border-gray-100 hover:border-indigo-100 transition-all group">
                                <div className="w-10 h-10 rounded-full bg-indigo-100 text-indigo-500 flex items-center justify-center font-bold shadow-sm">
                                    {m.photo ? <img src={m.photo} className="w-full h-full rounded-full object-cover" /> : m.name.charAt(0).toUpperCase()}
                                </div>
                                <div className="flex-1 min-w-0">
                                    <p className="text-sm font-bold text-gray-700 truncate">{m.name}</p>
                                </div>
                                <div className="text-[10px] font-bold text-emerald-500 bg-emerald-50 px-2 py-1 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity">Active</div>
                            </div>
                        ))}
                    </div>
                    <div className="mt-6 text-center"><button onClick={onClose} className="px-8 py-3 rounded-2xl text-xs font-bold text-white bg-[#04BADE] hover:bg-[#03a6c7] transition shadow-lg w-full">Đóng</button></div>
                </div>
            </div>
        );

        // ── 6. SIDEBAR COMPONENTS ────────────────────────────────
        const SidebarTop = ({ syncing, onOpenManage, onOpenCourts }) => (
            <div className="card p-4 shrink-0 flex flex-col gap-4">
                <div className="flex items-center justify-between">
                    <div className="flex items-center gap-2">
                        <div className="w-7 h-7 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-xs text-white">📅</div>
                        <span className="font-bold text-sm tracking-tight">Lịch Rảnh</span>
                    </div>
                    <div className="flex items-center gap-1 text-[9px] font-semibold tracking-wider uppercase text-gray-300">
                        <SyncIcon spin={syncing} /> {syncing ? 'Saving' : 'MOCK'}
                    </div>
                </div>
                <div className="space-y-2">
                    <div className="flex items-center gap-2 px-3 py-2 rounded-xl bg-gray-50 border border-gray-100">
                        <div className="w-7 h-7 rounded-full bg-indigo-100 text-indigo-500 flex items-center justify-center text-[11px] font-bold">M</div>
                        <span className="text-xs font-bold text-gray-700 truncate">{MOCK_ME.displayName}</span>
                    </div>
                    <button onClick={onOpenManage} className="w-full flex items-center justify-center gap-2 px-3 py-2 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 border border-indigo-100 rounded-xl text-[10px] font-bold uppercase tracking-wider transition-all shadow-sm">
                        <span className="text-[14px]">🏸</span> Quản lý đặt sân
                    </button>
                    <button onClick={onOpenCourts} className="w-full flex items-center justify-center gap-2 px-3 py-2 bg-emerald-50 text-emerald-600 hover:bg-emerald-100 border border-emerald-100 rounded-xl text-[10px] font-bold uppercase tracking-wider transition-all shadow-sm">
                        <span className="text-[14px]">📍</span> Danh sách sân
                    </button>
                </div>
            </div>
        );

        const SidebarDetail = ({ activeSlot, bookedSlots, slotUsers }) => {
            const info = bookedSlots[activeSlot];
            return (
                <div className="card p-5 flex flex-col flex-1 min-h-0">
                    {!activeSlot ? (
                        <div className="flex flex-col items-center justify-center py-14 text-gray-200 text-center flex-1">
                            <p className="text-[9px] font-semibold uppercase tracking-widest">Chọn ô tổng hợp</p>
                        </div>
                    ) : (
                        <div className="fade-in space-y-5 flex flex-col flex-1 min-h-0">
                            {/* Phần 1: Thông tin sân */}
                            <div className="shrink-0 space-y-3">
                                <h2 className="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-900 pb-2 border-b border-gray-100">Thông tin sân</h2>
                                <div className="bg-gray-50 border border-gray-100 rounded-xl p-3 space-y-2.5 shadow-sm">
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs">📅</span>
                                        <span className="text-[11px] font-bold text-gray-600 uppercase tracking-tight">
                                            {activeSlot.replace('-', ' • ')}
                                        </span>
                                    </div>
                                    <div className="flex items-start gap-2 pt-2 border-t border-gray-200/50">
                                        <span className="text-xs">🏸</span>
                                        {info ? (
                                            <div>
                                                <p className="text-[11px] font-bold text-emerald-700 leading-tight">{info.court}</p>
                                                <p className="text-[9px] text-emerald-600/60 mt-0.5 italic">Người đặt: <b>{info.user}</b></p>
                                            </div>
                                        ) : (
                                            <p className="text-[11px] text-gray-400 italic">Trống</p>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Phần 2: Danh sách */}
                            <div className="flex flex-col flex-1 min-h-0">
                                <div className="flex items-center justify-between mb-3 pb-2 border-b border-gray-100 shrink-0">
                                    <h2 className="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-900">Ai rảnh?</h2>
                                </div>
                                <div className="space-y-1.5 flex-1 overflow-y-auto custom-scrollbar pr-1 pb-1">
                                    {(slotUsers[activeSlot] || []).length === 0 ? (
                                        <p className="text-[10px] text-center py-8 text-gray-300 italic">Trống</p>
                                    ) : (slotUsers[activeSlot] || []).map((u, i) => (
                                        <div key={i} className="flex items-center gap-2 p-2 rounded-xl bg-white border border-gray-100 hover:border-indigo-100 transition-all">
                                            {u.photo
                                                ? <img src={u.photo} className="w-7 h-7 rounded-lg object-cover" />
                                                : <div className="w-7 h-7 rounded-lg bg-indigo-50 text-indigo-400 flex items-center justify-center text-[10px] font-bold">{u.name.charAt(0).toUpperCase()}</div>
                                            }
                                            <p className="text-[11px] font-semibold text-gray-500 truncate">{u.name}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ── 7. MAIN APP ──────────────────────────────────────────
        function App() {
            const [mySlots, setMySlots] = useState(new Set(MOCK_SCHEDULES[0].slots));
            const [fixed, setFixed] = useState(false);
            const [activeSlot, setActiveSlot] = useState('T2-08:00');
            const [modalConfig, setModalConfig] = useState(null);
            const [syncing, setSyncing] = useState(false);
            const [bookedSlots, setBookedSlots] = useState({
                'T2-08:00': { court: 'EZB Đằng Hải', user: 'Mạnh Nguyễn' },
                'T2-09:00': { court: 'EZB Đằng Hải', user: 'Mạnh Nguyễn' }
            });

            const [isManageModalOpen, setIsManageModalOpen] = useState(false);
            const [isCourtModalOpen, setIsCourtModalOpen] = useState(false);
            const [isSelectCourtModalOpen, setIsSelectCourtModalOpen] = useState(false);
            const [isMemberListModalOpen, setIsMemberListModalOpen] = useState(false);

            const [newSelection, setNewSelection] = useState(new Set());
            const [deleteSelection, setDeleteSelection] = useState(new Set());
            const [selectedCourt, setSelectedCourt] = useState(COURTS[0].name);

            const grid1Ref = useRef(null);
            const grid2Ref = useRef(null);

            useEffect(() => {
                const el1 = grid1Ref.current;
                const el2 = grid2Ref.current;
                if (!el1 || !el2) return;
                let lock = false;
                const onScroll1 = () => { if (!lock) { lock = true; el2.scrollTop = el1.scrollTop; el2.scrollLeft = el1.scrollLeft; window.requestAnimationFrame(() => lock = false); } };
                const onScroll2 = () => { if (!lock) { lock = true; el1.scrollTop = el2.scrollTop; el1.scrollLeft = el2.scrollLeft; window.requestAnimationFrame(() => lock = false); } };
                el1.addEventListener('scroll', onScroll1, { passive: true });
                el2.addEventListener('scroll', onScroll2, { passive: true });
                return () => { el1.removeEventListener('scroll', onScroll1); el2.removeEventListener('scroll', onScroll2); };
            }, []);

            const allSchedules = useMemo(() => [
                { ...MOCK_SCHEDULES[0], slots: Array.from(mySlots) },
                ...MOCK_SCHEDULES.slice(1)
            ], [mySlots]);

            const heatmap = useMemo(() => {
                const map = {};
                allSchedules.forEach(entry => entry.slots.forEach(slot => { map[slot] = (map[slot] || 0) + 1; }));
                return map;
            }, [allSchedules]);

            const slotUsers = useMemo(() => {
                const map = {};
                allSchedules.forEach(entry => entry.slots.forEach(slot => {
                    if (!map[slot]) map[slot] = [];
                    map[slot].push({ name: entry.name, photo: entry.photo });
                }));
                return map;
            }, [allSchedules]);

            const handleFinalSave = () => {
                const next = { ...bookedSlots };
                deleteSelection.forEach(k => delete next[k]);
                newSelection.forEach(k => { next[k] = { court: selectedCourt, user: MOCK_ME.displayName }; });
                setBookedSlots(next);
                setIsSelectCourtModalOpen(false);
                setIsManageModalOpen(false);
                setNewSelection(new Set());
                setDeleteSelection(new Set());
            };

            const toggleSlot = (key) => {
                const n = new Set(mySlots);
                n.has(key) ? n.delete(key) : n.add(key);
                setMySlots(n);
                setSyncing(true);
                setTimeout(() => setSyncing(false), 500);
            };

            return (
                <div className="min-h-screen p-4 md:p-6 relative">
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 max-w-[1400px] mx-auto items-start">

                        <section className="order-2 lg:order-none lg:col-span-5 card p-5 flex flex-col h-[70vh] lg:h-[calc(100vh-48px)]">
                            <SectionHeader title="1. Lịch cá nhân" colorClass="text-[#04BADE]" icon={<svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>}>
                                <div className="flex items-center gap-2">
                                    <FixedToggle fixed={fixed} onToggle={() => { setFixed(!fixed); setSyncing(true); setTimeout(() => setSyncing(false), 500); }} />
                                    <button onClick={() => setModalConfig({ message: 'Mày chắc chưa? Sẽ chọn tất cả các ca trong tuần đó!', onConfirm: () => { const all = new Set(); DAYS.forEach(d => TIMES.forEach(t => all.add(`${d}-${t}`))); setMySlots(all); setModalConfig(null); } })} className="px-2.5 py-1 rounded-lg border border-[#04BADE]/30 bg-[#04BADE]/10 text-[#04BADE] text-[10px] font-semibold hover:bg-[#04BADE]/20 transition-all">Chọn tất cả</button>
                                    <button onClick={() => setModalConfig({ message: 'Mày chắc chưa? Sẽ xoá toàn bộ lịch đã chọn đó!', onConfirm: () => { setMySlots(new Set()); setModalConfig(null); } })} className="px-2.5 py-1 rounded-lg border border-rose-200 bg-rose-50 text-rose-600 text-[10px] font-semibold hover:bg-rose-100 transition-all">Bỏ chọn</button>
                                </div>
                            </SectionHeader>
                            <TimeGrid innerRef={grid1Ref} days={DAYS} times={TIMES} renderCell={(day, time) => {
                                const key = `${day}-${time}`;
                                const sel = mySlots.has(key);
                                return (
                                    <button key={key} onClick={() => toggleSlot(key)}
                                        className={`w-full rounded-xl border h-9 flex items-center justify-center transition-all duration-150 ${sel ? 'bg-[#04BADE] border-[#03a6c7] text-white shadow-sm scale-[0.97]' : 'bg-gray-50 border-gray-100 hover:bg-white hover:border-[#04BADE]/40'}`}>
                                        {sel && <svg className="w-3 h-3" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>}
                                    </button>
                                );
                            }} />
                        </section>

                        <section className="order-3 lg:order-none lg:col-span-5 card p-5 flex flex-col h-[70vh] lg:h-[calc(100vh-48px)]">
                            <SectionHeader title="2. Lịch tổng kết" colorClass="text-rose-400" icon={<svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-3-3.87M9 21v-2a4 4 0 01-4-4H5a4 4 0 01-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" /></svg>}>
                                <button
                                    onClick={() => setIsMemberListModalOpen(true)}
                                    className="text-[10px] text-gray-400 font-bold bg-gray-50 hover:bg-gray-100 border border-gray-100 px-2 py-1 rounded-lg transition-all shadow-sm"
                                >
                                    {allSchedules.length} thành viên
                                </button>
                            </SectionHeader>
                            <TimeGrid innerRef={grid2Ref} days={DAYS} times={TIMES} renderCell={(day, time) => {
                                const key = `${day}-${time}`;
                                const count = heatmap[key] || 0;
                                const c = heatColor(count);
                                const isActive = activeSlot === key;
                                const info = bookedSlots[key];
                                const isSelected = mySlots.has(key);
                                return (
                                    <button key={key} onClick={() => setActiveSlot(isActive ? null : key)} style={{ background: c.bg, color: c.text, borderColor: isActive ? '#6366f1' : c.border, outline: isActive ? '2px solid #c7d2fe' : 'none', outlineOffset: '1px' }} className="relative w-full rounded-xl border h-9 flex items-center justify-center text-[11px] font-bold transition-all hover:brightness-95">
                                        {count > 0 ? count : ''}
                                        {info && <span className="absolute bottom-0.5 right-0.5 text-[10px] leading-none drop-shadow-sm" title={`${info.court} - ${info.user}`}>🏸</span>}
                                        {isSelected && <div className="absolute top-1 right-1 w-1.5 h-1.5 bg-white rounded-full shadow-[0_0_3px_rgba(0,0,0,0.3)] ring-1 ring-black/5" title="Ca bạn đã chọn"></div>}
                                    </button>
                                );
                            }} />
                        </section>

                        <aside className="order-1 lg:order-none lg:col-span-2 flex flex-col gap-4 lg:h-[calc(100vh-48px)] lg:sticky lg:top-4">
                            <SidebarTop syncing={syncing} onOpenManage={() => { setNewSelection(new Set()); setDeleteSelection(new Set()); setIsManageModalOpen(true); }} onOpenCourts={() => setIsCourtModalOpen(true)} />
                            <SidebarDetail activeSlot={activeSlot} bookedSlots={bookedSlots} slotUsers={slotUsers} />
                        </aside>

                        {isManageModalOpen && <ManageBookingModal heatmap={heatmap} bookedSlots={bookedSlots} newSelection={newSelection} setNewSelection={setNewSelection} deleteSelection={deleteSelection} setDeleteSelection={setDeleteSelection} onClose={() => setIsManageModalOpen(false)} onSelectCourt={() => setIsSelectCourtModalOpen(true)} />}
                        {isSelectCourtModalOpen && <SelectCourtModal newCount={newSelection.size} delCount={deleteSelection.size} selectedCourt={selectedCourt} setSelectedCourt={setSelectedCourt} onBack={() => setIsSelectCourtModalOpen(false)} onSave={handleFinalSave} />}
                        {isCourtModalOpen && <CourtListModal onClose={() => setIsCourtModalOpen(false)} />}
                        {isMemberListModalOpen && <MemberListModal members={allSchedules} onClose={() => setIsMemberListModalOpen(false)} />}
                        {modalConfig && <ConfirmationModal config={modalConfig} onClose={() => setModalConfig(null)} />}

                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
